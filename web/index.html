<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MalteGO — GreyNoise Intelligence Graph</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
</head>
<body>
  <div id="sidebar">
    <div id="logo">
      <span class="logo-text">MalteGO</span>
      <span class="logo-sub">GreyNoise Intelligence</span>
    </div>

    <div class="panel">
      <label>GreyNoise API Key</label>
      <div class="save-row">
        <input id="input-apikey" type="password" placeholder="Paste your API key…" autocomplete="off">
        <button id="btn-apikey-save" class="secondary">Set</button>
      </div>
      <div id="apikey-status"></div>
    </div>

    <div class="panel">
      <label>Entity Value</label>
      <input id="input-value" type="text" placeholder="8.8.8.8" autocomplete="off">

      <label>Transform</label>
      <select id="input-transform">
        <option value="">Loading...</option>
      </select>

      <button id="btn-run">Run Transform</button>
      <div class="btn-row">
        <button id="btn-clear" class="secondary">Clear</button>
        <button id="btn-export-png" class="secondary">PNG</button>
        <button id="btn-export-json" class="secondary">JSON</button>
      </div>
    </div>

    <div class="panel">
      <label>Save / Load Graph</label>
      <div class="save-row">
        <input id="graph-name" type="text" placeholder="Graph name…" autocomplete="off">
        <button id="btn-save" class="secondary">Save</button>
      </div>
      <div id="saved-graphs-list"></div>
      <button id="btn-load-more" class="secondary" style="display:none;font-size:11px;padding:5px">Load more…</button>
    </div>

    <div class="panel" id="detail-panel" style="display:none">
      <label>Selected Entity</label>
      <div id="detail-type" class="tag"></div>
      <div id="detail-value" class="detail-value"></div>
      <div id="detail-props"></div>
    </div>

    <div id="status"></div>
  </div>

  <div id="graph-container">
    <div id="cy"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
