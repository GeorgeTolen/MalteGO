services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: maltego
      POSTGRES_USER: maltego
      POSTGRES_PASSWORD: maltego
    volumes:
      - maltego-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maltego -d maltego"]
      interval: 10s
      timeout: 5s
      retries: 5

  greynoise-api:
    build:
      context: .
      dockerfile: docker/greynoise-api.Dockerfile
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - GIN_MODE=release
      - GREYNOISE_API_PORT=8090
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  transforms:
    build:
      context: .
      dockerfile: docker/transforms.Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - GIN_MODE=release
      - GREYNOISE_API_URL=http://greynoise-api:8090
      - DATABASE_URL=postgres://maltego:maltego@postgres:5432/maltego?sslmode=disable
    depends_on:
      greynoise-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - GIN_MODE=release
      - TRANSFORM_SERVICE_URL=http://transforms:8080
      - UI_PORT=3000
    depends_on:
      transforms:
        condition: service_healthy
    restart: unless-stopped

volumes:
  maltego-data:
